<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — BotForge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
  <style>
    /* ── Full-page chat shell ── */
    body {
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bc-shell {
      width: 100%;
      max-width: 740px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    .bc-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      height: 62px;
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      box-shadow: 0 1px 8px rgba(0,0,0,.06);
    }

    .bc-back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 9px;
      border: 1px solid var(--border-strong);
      background: transparent;
      color: var(--text-muted);
      text-decoration: none;
      transition: all .15s;
      flex-shrink: 0;
    }

    .bc-back:hover {
      color: var(--primary);
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .bc-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1rem;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }

    .bc-hinfo { flex: 1; min-width: 0; }

    .bc-hname {
      font-weight: 700;
      font-size: 0.94rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bc-hmeta {
      font-size: 0.72rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }

    .bc-live-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: #ecfdf5;
      border: 1px solid #a7f3d0;
      border-radius: 20px;
      font-size: 0.71rem;
      font-weight: 700;
      color: #059669;
      flex-shrink: 0;
    }

    .bc-live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #10b981;
      animation: livePulse 2s ease-in-out infinite;
    }

    @keyframes livePulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.8); }
    }

    /* ── Info strip ── */
    .bc-info-strip {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 16px;
      background: var(--primary-light);
      border-bottom: 1px solid rgba(79,70,229,.1);
      flex-shrink: 0;
      overflow: hidden;
    }

    .bc-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      background: rgba(79,70,229,.12);
      color: var(--primary);
      border-radius: 20px;
      font-size: 0.68rem;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .bc-tag-sep {
      color: rgba(79,70,229,.3);
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    .bc-info-desc {
      font-size: 0.71rem;
      color: #5c6bc0;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Chat window ── */
    .bc-chat-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 12px;
      display: flex;
      flex-direction: column;
      scroll-behavior: smooth;
    }

    .bc-chat-wrap::-webkit-scrollbar { width: 4px; }
    .bc-chat-wrap::-webkit-scrollbar-track { background: transparent; }
    .bc-chat-wrap::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

    /* ── Message rows ── */
    .bc-msg {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      margin-bottom: 6px;
      animation: msgSlide .25s cubic-bezier(.34,1.4,.64,1);
    }

    @keyframes msgSlide {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bc-msg.msg-user { justify-content: flex-end; }
    .bc-msg.msg-system { justify-content: center; }

    .bc-msg-av {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      margin-bottom: 2px;
    }

    .bc-msg-av.hidden-av { visibility: hidden; }

    .bc-bubble {
      max-width: 72%;
      padding: 10px 14px;
      font-size: 0.875rem;
      line-height: 1.52;
      word-break: break-word;
    }

    .msg-bot .bc-bubble {
      background: #ffffff;
      color: var(--text);
      border-radius: 4px 18px 18px 18px;
      border: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }

    .msg-user .bc-bubble {
      background: var(--primary);
      color: #ffffff;
      border-radius: 18px 4px 18px 18px;
    }

    .msg-system .bc-bubble {
      background: #fef9c3;
      color: #713f12;
      border: 1px solid #fde047;
      border-radius: 12px;
      font-size: 0.8rem;
      text-align: center;
    }

    /* ── Typing dots ── */
    .bc-typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
    }

    .bc-typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      display: inline-block;
      animation: dotBounce 1.3s infinite ease-in-out;
    }

    .bc-typing span:nth-child(1) { animation-delay: 0s; }
    .bc-typing span:nth-child(2) { animation-delay: .18s; }
    .bc-typing span:nth-child(3) { animation-delay: .36s; }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%           { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Date label ── */
    .bc-date-label {
      text-align: center;
      font-size: 0.68rem;
      color: var(--text-muted);
      margin: 14px 0 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bc-date-label::before,
    .bc-date-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Quick reply chips (optional, shown after welcome) ── */
    .bc-quick-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 8px 0 4px 36px;
    }

    .bc-chip {
      padding: 5px 12px;
      border: 1.5px solid var(--primary);
      color: var(--primary);
      border-radius: 20px;
      font-size: 0.76rem;
      font-weight: 600;
      background: transparent;
      cursor: pointer;
      transition: all .15s;
    }

    .bc-chip:hover {
      background: var(--primary);
      color: #fff;
    }

    /* ── Input area ── */
    .bc-input-area {
      padding: 10px 16px 12px;
      background: #ffffff;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .bc-form {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bc-input {
      flex: 1;
      padding: 10px 16px;
      border: 1.5px solid var(--border-strong);
      border-radius: 24px;
      background: var(--bg);
      color: var(--text);
      font: 0.875rem/1 inherit;
      outline: none;
      transition: border-color .15s, background .15s;
    }

    .bc-input:focus {
      border-color: var(--primary);
      background: #fff;
    }

    .bc-input::placeholder { color: var(--text-subtle); }

    .bc-send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: var(--primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .15s, transform .1s, box-shadow .15s;
      box-shadow: 0 2px 8px rgba(79,70,229,.3);
    }

    .bc-send-btn:hover {
      background: var(--primary-dark);
      box-shadow: 0 4px 14px rgba(79,70,229,.4);
    }

    .bc-send-btn:active { transform: scale(0.93); }
    .bc-send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    .bc-input-hint {
      text-align: center;
      font-size: 0.67rem;
      color: var(--text-subtle);
      margin-top: 5px;
    }

    /* ── Loading skeleton ── */
    .bc-loading {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--text-muted);
    }

    .bc-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .bc-loading p { font-size: 0.82rem; }

    /* ── Embed mode (no back button, no info strip) ── */
    body.embed-mode .bc-back,
    body.embed-mode .bc-info-strip { display: none; }
    body.embed-mode .bc-shell { border-radius: 16px; overflow: hidden; }
  </style>
</head>
<body>
  <div class="bc-shell">

    <!-- Header -->
    <header class="bc-header">
      <a href="/" class="bc-back" title="Back to BotForge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
      </a>

      <div class="bc-avatar" id="bcAvatar">A</div>

      <div class="bc-hinfo">
        <div class="bc-hname" id="bcName">Loading chatbot…</div>
        <div class="bc-hmeta" id="bcMeta">Connecting…</div>
      </div>

      <div class="bc-live-badge">
        <div class="bc-live-dot"></div>
        Live
      </div>
    </header>

    <!-- Info strip -->
    <div class="bc-info-strip" id="bcInfoStrip">
      <span class="bc-tag" id="bcType">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
        …
      </span>
      <span class="bc-tag-sep">·</span>
      <span class="bc-tag" id="bcTone">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        …
      </span>
      <span class="bc-tag-sep">·</span>
      <span class="bc-info-desc" id="bcDesc">Loading…</span>
    </div>

    <!-- Chat window -->
    <div class="bc-chat-wrap" id="botChatWindow" aria-live="polite">
      <div class="bc-loading">
        <div class="bc-spinner"></div>
        <p>Loading chatbot…</p>
      </div>
    </div>

    <!-- Input -->
    <div class="bc-input-area">
      <form class="bc-form" id="botChatForm">
        <input
          class="bc-input"
          id="botChatInput"
          type="text"
          placeholder="Ask me anything…"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="bc-send-btn" type="submit" id="bcSendBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2" fill="currentColor" stroke="none"/>
          </svg>
        </button>
      </form>
      <div class="bc-input-hint" id="bcHint">Powered by BotForge</div>
    </div>

  </div>

  <script type="module" src="/bot.js"></script>
</body>
</html>
