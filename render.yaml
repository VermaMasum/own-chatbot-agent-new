services:
  - type: web
    name: own-chatbot-agent
    env: node
    plan: free
    rootDir: .
    buildCommand: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true npm install && npx prisma generate
    startCommand: node src/index.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_MODEL
        value: llama-3.1-8b-instant
      - key: AI_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: JWT_SECRET
        generateValue: true
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
